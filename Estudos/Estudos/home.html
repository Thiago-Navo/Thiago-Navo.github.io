<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Home</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .box {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1 id="msg"></h1>
        <button onclick="sair()">Sair</button>
    </div>

    <script>
        let nome = localStorage.getItem("nomeUsuario");

        if (!nome) {
            window.location.href = "index.html";
        }

        document.getElementById("msg").innerText = "Bem-vindo, " + nome + "!";

        function sair() {
            localStorage.removeItem("nomeUsuario");
            window.location.href = "index.html";
        }
    </script>

</body>
</html>
